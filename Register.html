<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
width:320px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#2196F3;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1e88e5;
}

a{
text-decoration:none;
color:blue;
}

</style>
</head>

<body>

<div class="container">

<h2>Create Account</h2>

<form action="Login.html">

<input type="text" placeholder="Username" required>
<input type="email" placeholder="Email" required>
<input type="password" placeholder="Password" required>

<button type="submit">Register</button>

<p>Already have an account? <a href="Login.html">Login</a></p>

</form>

</div>

</body>
</html>
