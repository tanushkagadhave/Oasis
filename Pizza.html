<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pizza Builder</title>
<link rel="stylesheet" href="Pizza.css">
</head>

<body>

<header>
<h1>Custom Pizza Builder</h1>
</header>

<div class="container">

<h2>Build Your Pizza</h2>

<form>

<!-- Pizza Base -->
<label>Choose Pizza Base</label>
<select>
<option>Thin Crust</option>
<option>Thick Crust</option>
<option>Cheese Burst</option>
<option>Whole Wheat</option>
<option>Gluten Free</option>
</select>

<!-- Sauce -->
<label>Select Sauce</label>
<select>
<option>Tomato Sauce</option>
<option>BBQ Sauce</option>
<option>Pesto Sauce</option>
<option>White Garlic Sauce</option>
<option>Spicy Sauce</option>
</select>

<!-- Cheese -->
<label>Select Cheese</label>
<select>
<option>Mozzarella</option>
<option>Cheddar</option>
<option>Parmesan</option>
<option>Vegan Cheese</option>
</select>

<!-- Veggies -->
<label>Select Veggies</label>

<div class="checkbox-group">
<label><input type="checkbox"> Onion</label>
<label><input type="checkbox"> Capsicum</label>
<label><input type="checkbox"> Mushroom</label>
<label><input type="checkbox"> Corn</label>
<label><input type="checkbox"> Tomato</label>
<label><input type="checkbox"> Olive</label>
</div>

<button type="submit">Proceed to Payment</button>

</form>

</div>

</body>
</html>
