<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
width:300px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

a{
text-decoration:none;
color:blue;
}

</style>
</head>

<body>

<div class="container">
<h2>Login</h2>

<form action="Dashboard.html">
<input type="text" placeholder="Username" required>
<input type="password" placeholder="Password" required>

<button type="submit">Login</button>

<p>Don't have an account? <a href="Register.html">Register</a></p>
</form>

</div>

</body>
</html>
